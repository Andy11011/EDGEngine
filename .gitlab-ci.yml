stages:
  - docker_img

default:
  tags:
    - localRunner

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  RUNNER_SCRIPT_TIMEOUT: 150m
  RUNNER_AFTER_SCRIPT_TIMEOUT: 150m

# Builds and pushes linux/amd64 image tags for edgedesk.
docker_img_x86_64:
  stage: docker_img
  image: docker:27.5.1-cli
  services:
    - name: docker:27.5.1-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    - |
      set -e
      FULL_IMAGE_NAME="$CI_REGISTRY/$CI_PROJECT_NAMESPACE/edgedesk"
      echo "Building amd64 image: $FULL_IMAGE_NAME"

      docker build \
        -t "$FULL_IMAGE_NAME:latest" \
        -t "$FULL_IMAGE_NAME:$CI_COMMIT_SHORT_SHA" \
        .

      docker push "$FULL_IMAGE_NAME:latest"
      docker push "$FULL_IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
    - when: manual

# Builds and pushes linux/amd64 and linux/arm64 image tags for edgedesk.
docker_img_multiarch:
  stage: docker_img
  image: docker:27.5.1-cli
  services:
    - name: docker:27.5.1-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    - |
      set -e
      FULL_IMAGE_NAME="$CI_REGISTRY/$CI_PROJECT_NAMESPACE/edgedesk"
      echo "Building multi-arch image: $FULL_IMAGE_NAME"

      docker buildx create --use --name edgedesk-builder || true
      docker buildx build --platform linux/amd64,linux/arm64 \
        -t "$FULL_IMAGE_NAME:latest" \
        -t "$FULL_IMAGE_NAME:$CI_COMMIT_SHORT_SHA" \
        --push \
        .
  when: manual
  allow_failure: false
  rules:
    - when: manual
